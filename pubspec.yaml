name: zinde_ai
description: "Yapay zeka destekli beslenme ve antrenman planlama uygulaması"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  provider: ^6.1.1

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Yerel Depolama
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Ağ
  dio: ^5.4.0
  http: ^1.1.2
  internet_connection_checker: ^1.0.0

  # Veritabanı (Supabase / PostgreSQL)
  supabase_flutter: ^2.6.0

  # UI
  table_calendar: ^3.0.9
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8

  # Yardımcılar
  intl: ^0.18.1
  logger: ^2.0.2+1
  dartz: ^0.10.1
  uuid: ^4.3.3
  path: ^1.8.3
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  injectable_generator: ^2.4.1
  mockito: ^5.4.3
  bloc_test: ^9.1.5
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
    - assets/seeds/
